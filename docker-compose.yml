services:
  
  # --- LOAD BALANCERS ---
  
  # --- HAPROX 1 SSL ---
  haproxy1-ssl:
    container_name: haproxy1-ssl
    build: ./haproxy1-ssl
    volumes:
      - "./haproxy1-ssl/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg"
    ports:
      - "8080:443"
      - "8405:8404"
    depends_on:
      haproxy1-int:
        condition: service_healthy

  # --- HAPROXY 1 INT ---
  haproxy1-int:
    container_name: haproxy1-int
    build: ./haproxy1-int
    volumes:
      - "./haproxy1-int/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg"
    ports:
      - "443:80"
      - "8404:8404"
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      ngx1:
        condition: service_started
      ngx2:
        condition: service_started

  # --- Nginx (APP) ---
  ngx1:
    container_name: ngx1
    image: nginx:latest
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"   
  ngx2:
    container_name: ngx2
    image: nginx:latest
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
  
  # --- REDIS ---

  # --- MASTER ---
  redis-master:
    container_name: redis-master
    image: redis:8.2.5-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "muyfacil", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - "./redis/master/redis.conf:/etc/redis/redis.conf"
      - redis-master:/data
    command: redis-server /etc/redis/redis.conf
  
  # --- SLAVE ---
  redis-slave:
    container_name: redis-slave
    image: redis:8.2.5-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "muyfacil", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - "./redis/slave/redis.conf:/etc/redis/redis.conf"
      - redis-slave:/data
    command: redis-server /etc/redis/redis.conf

  # --- SENTINEL ---
  redis-sentinel:
    container_name: redis-sentinel
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_SENTINEL_MASTER_NAME=mymaster
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PASSWORD=muyfacil
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave:
        condition: service_healthy
  
  # --------------- FIN REDIS ---------------
  
  # --- SOLR ---      
  solr:
    container_name: solr
    image: solr:9.10.1 
    ports:
      - "8983:8983"
    volumes:
      - solr:/var/solr
  
  # --- WEBDAV ---
  webdav:
    container_name: webdav
    build: ./webdav
    ports:
      - "8081:80"
    volumes:
      - webdav:/usr/local/apache2/htdocs/
      - webdav-up:/usr/local/apache2/uploads
      - webdav-var:/usr/local/apache2/var
  
  # --- LDAP ---
  ldap:
    container_name: ldap
    image: osixia/openldap:1.5.0
    environment:
      - LDAP_ROOT=dc=empresa,dc=com
      - LDAP_ADMIN_USERNAME=admin 
      - LDAP_ADMIN_PASSWORD=admin
      - LDAP_ORGANISATION=apptest
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
  
  # --- Observabilidad ---

  # --- PROMETHEUS ---
  prometheus:
    container_name: prometheus
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - prome:/prometheus

  # --- GRAFANA ---
  grafana:
    container_name: grafana
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafa:/var/lib/grafana


# --- TRAFFIC GENERATOR ---
  traffic-generator:
    container_name: traffic-generator
    build: ./traffic-generator
    environment:
      # Tiempo de espera inicial antes de empezar a generar tráfico.
      # Dale margen para que Redis, Solr y HAProxy terminen de arrancar.
      - STARTUP_WAIT=30
    depends_on:
      haproxy1-int:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    restart: unless-stopped





  # --- EXPORTERs ---

  ha1-int_exporter:
    container_name: ha1-int_exporter
    image:  quay.io/prometheus/haproxy-exporter:latest
    ports:
      - ":9101"
    command:
      - "--haproxy.scrape-uri=http://haproxy1-int:8404/stats;csv"
  ha1-ssl_exporter:
    container_name: ha1-ssl_exporter
    image:  quay.io/prometheus/haproxy-exporter:latest
    ports:
      - ":9101"
    command:
      - "--haproxy.scrape-uri=http://haproxy1-ssl:8404/stats;csv"
  ngx1_exporter:
    container_name: ngx1_exporter
    image: nginx/nginx-prometheus-exporter:latest
    ports:
      - ":9113"
    command: --nginx.scrape-uri=http://ngx1:80/stub_status
  ngx2_exporter:
    container_name: ngx2_exporter
    image: nginx/nginx-prometheus-exporter:latest
    ports:
      - ":9113"
    command: --nginx.scrape-uri=http://ngx2:80/stub_status
  redis_exporter:
    container_name: redis_exporter
    image: oliver006/redis_exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis-master:6379
      - REDIS_PASSWORD=muyfacil
  solr_exporter:
    container_name: solr_exporter
    image: noony/prometheus-solr-exporter
    ports:
      - "9231:9231"
    command: ["--solr.address", "http://solr:8983"]
        
# --- MOUNTED VOLUMES ---      
volumes:
  redis-master:
  redis-slave:
  solr:
  webdav:
  webdav-up:
  webdav-var:
  ldap_data:
  ldap_config:
  prome:
  grafa:

networks:
  default:
    name: dockham-city