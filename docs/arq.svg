  <line x1="255" y1="242" x2="175" y2="272" stroke="#00aaff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="345" y1="242" x2="425" y2="272" stroke="#00aaff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

